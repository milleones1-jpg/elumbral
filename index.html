<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EL UMBRAL</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #d4af37;
      --gold-light: #f5d77a;
      --bg-dark: rgba(0, 0, 0, 0.82);
      --card-bg: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.1);
      --soft-text: #ececec;
    }

    body {
      font-family: Georgia, serif;
      background: url('https://images.unsplash.com/photo-1502134249126-9f3755a50d78?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .overlay {
      background: var(--bg-dark);
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo svg {
      filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.45));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .star {
      transform-origin: 150px 150px;
      animation: spin 18s linear infinite;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 2rem;
      color: var(--gold-light);
      letter-spacing: 3px;
      font-weight: bold;
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.92rem;
      color: #d9d9d9;
      margin-top: 6px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .menu a,
    .menu button,
    .menu select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.22);
      color: white;
      padding: 9px 13px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
      font-size: 0.95rem;
      transition: 0.25s;
    }

    .menu a:hover,
    .menu button:hover,
    .menu select:hover {
      background: rgba(255,255,255,0.12);
      color: var(--gold-light);
      border-color: rgba(245,215,122,0.6);
    }

    .menu select {
      min-width: 145px;
      outline: none;
    }

    .menu select option {
      color: black;
    }

    .premium-btn {
      background: linear-gradient(135deg, rgba(212,175,55,0.24), rgba(255,255,255,0.05));
      border-color: rgba(245,215,122,0.65) !important;
      color: var(--gold-light) !important;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 45px;
    }

    .hero-badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(245,215,122,0.35);
      color: var(--gold-light);
      background: rgba(255,255,255,0.05);
      font-size: 0.92rem;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      text-shadow: 0 0 12px rgba(0,0,0,0.75);
    }

    .hero p {
      max-width: 920px;
      margin: auto;
      line-height: 1.7;
      font-size: 1.08rem;
      color: var(--soft-text);
    }

    .section-title {
      text-align: center;
      color: var(--gold-light);
      font-size: 2rem;
      margin: 25px 0;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.25s;
      position: relative;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.36);
    }

    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 16px;
    }

    .card-content h3 {
      color: var(--gold-light);
      font-size: 1.18rem;
      margin-bottom: 10px;
      line-height: 1.35;
    }

    .card-content p {
      color: #efefef;
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .premium-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(212,175,55,0.96);
      color: black;
      font-weight: bold;
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .panel-box {
      display: none;
      margin-top: 30px;
      background: rgba(255,255,255,0.08);
      padding: 22px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 28px rgba(0,0,0,0.3);
    }

    .panel-box.active {
      display: block;
    }

    .panel-box img {
      width: 100%;
      max-height: 430px;
      object-fit: cover;
      margin-bottom: 18px;
      border-radius: 12px;
      display: block;
    }

    .panel-box h2 {
      color: var(--gold-light);
      margin-bottom: 14px;
      font-size: 2rem;
      line-height: 1.3;
    }

    .panel-box p {
      line-height: 1.8;
      color: #f2f2f2;
      font-size: 1.04rem;
      white-space: pre-line;
    }

    .premium-intro {
      text-align: center;
      margin-bottom: 22px;
    }

    .premium-intro h2 {
      color: var(--gold-light);
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .premium-intro p {
      max-width: 850px;
      margin: auto;
      color: var(--soft-text);
      line-height: 1.7;
    }

    .plans {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
      margin: 25px 0 30px;
    }

    .plan {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(245,215,122,0.22);
      border-radius: 14px;
      padding: 22px;
    }

    .plan h3 {
      color: var(--gold-light);
      font-size: 1.35rem;
      margin-bottom: 10px;
    }

    .plan-price {
      font-size: 2rem;
      color: white;
      margin-bottom: 14px;
      font-weight: bold;
    }

    .plan ul {
      padding-left: 18px;
      line-height: 1.8;
      color: #efefef;
    }

    .premium-login {
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-top: 10px;
    }

    .premium-login h3 {
      color: var(--gold-light);
      margin-bottom: 14px;
      font-size: 1.4rem;
    }

    .premium-login label,
    .admin-form label {
      display: block;
      margin: 16px 0 8px;
      color: var(--gold-light);
      font-weight: bold;
    }

    .premium-login input,
    .admin-form input,
    .admin-form textarea,
    .admin-form select {
      width: 100%;
      padding: 11px 12px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
    }

    .admin-form textarea {
      min-height: 180px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .save-btn,
    .back-btn,
    .enter-btn,
    .ghost-btn {
      padding: 11px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: 0.25s;
    }

    .save-btn,
    .back-btn,
    .enter-btn {
      background: var(--gold);
      color: black;
      border: none;
    }

    .save-btn:hover,
    .back-btn:hover,
    .enter-btn:hover {
      background: #f0c94d;
    }

    .ghost-btn {
      background: rgba(255,255,255,0.07);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .ghost-btn:hover {
      background: rgba(255,255,255,0.12);
      color: var(--gold-light);
    }

    .locked-box {
      text-align: center;
      padding: 30px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(245,215,122,0.2);
      border-radius: 14px;
      margin-top: 18px;
    }

    .locked-box h3 {
      color: var(--gold-light);
      margin-bottom: 10px;
      font-size: 1.6rem;
    }

    .locked-box p {
      max-width: 720px;
      margin: auto;
      color: #efefef;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      border-top: 1px solid rgba(255,255,255,0.2);
      color: #d8d8d8;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: center;
      }

      .brand {
        flex-direction: column;
        text-align: center;
      }

      .menu {
        justify-content: center;
      }

      .hero h1 {
        font-size: 2.3rem;
      }
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 1.9rem;
      }

      .hero p {
        font-size: 1rem;
      }

      .logo-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">

      <header class="topbar">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 300 300" width="82" height="82" xmlns="http://www.w3.org/2000/svg">
              <g class="star">
                <polygon
                  points="150,20 179,111 275,111 197,167 226,258 150,202 74,258 103,167 25,111 121,111"
                  fill="none"
                  stroke="#d4af37"
                  stroke-width="5"
                  stroke-linejoin="round"
                />
              </g>
              <circle cx="150" cy="150" r="45" fill="black" stroke="#d4af37" stroke-width="2"/>
              <path
                d="M150 105
                   A45 45 0 1 1 150 195
                   A22.5 22.5 0 1 0 150 105"
                fill="white"
              />
              <circle cx="150" cy="127" r="6" fill="white"/>
              <circle cx="150" cy="173" r="6" fill="black"/>
            </svg>
          </div>

          <div class="logo-text">
            <div class="logo-title">EL UMBRAL</div>
            <div class="logo-sub" id="logoSub"></div>
          </div>
        </div>

        <nav class="menu">
          <a href="#" onclick="showHome(); return false;" id="navHome"></a>
          <a href="#" onclick="openExpediente('ovni'); return false;" id="navOvni"></a>
          <a href="#" onclick="openExpediente('civilizaciones'); return false;" id="navCivilizaciones"></a>
          <a href="#" onclick="openExpediente('muerte'); return false;" id="navMuerte"></a>
          <a href="#" onclick="openExpediente('paranormal'); return false;" id="navParanormal"></a>
          <a href="#" onclick="openExpediente('tierra'); return false;" id="navTierra"></a>
          <a href="#" onclick="openExpediente('matrix'); return false;" id="navMatrix"></a>
          <a href="#" onclick="openExpediente('lectores'); return false;" id="navLectores"></a>
          <button class="premium-btn" onclick="showPremium()" id="navPremium"></button>
          <button onclick="toggleAdmin()" id="navAdmin"></button>

          <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇬🇧 English</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="pt">🇵🇹 Português</option>
          </select>
        </nav>
      </header>

      <section class="hero" id="homeSection">
        <div class="hero-badge" id="heroBadge"></div>
        <h1 id="heroTitle"></h1>
        <p id="heroText"></p>
      </section>

      <section id="cardsSection">
        <h2 class="section-title" id="mainSectionTitle"></h2>

        <div class="cards">
          <article class="card" onclick="openExpediente('ovni')">
            <img id="img-ovni" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-ovni"></h3>
              <p id="resumen-ovni"></p>
            </div>
          </article>

          <article class="card" onclick="openExpediente('civilizaciones')">
            <img id="img-civilizaciones" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-civilizaciones"></h3>
              <p id="resumen-civilizaciones"></p>
            </div>
          </article>

          <article class="card" onclick="openExpediente('muerte')">
            <img id="img-muerte" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-muerte"></h3>
              <p id="resumen-muerte"></p>
            </div>
          </article>

          <article class="card" onclick="openExpediente('paranormal')">
            <img id="img-paranormal" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-paranormal"></h3>
              <p id="resumen-paranormal"></p>
            </div>
          </article>

          <article class="card" onclick="openExpediente('tierra')">
            <img id="img-tierra" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-tierra"></h3>
              <p id="resumen-tierra"></p>
            </div>
          </article>

          <article class="card" onclick="openExpediente('matrix')">
            <img id="img-matrix" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-matrix"></h3>
              <p id="resumen-matrix"></p>
            </div>
          </article>

          <article class="card" onclick="openExpediente('lectores')">
            <img id="img-lectores" src="" alt="">
            <div class="card-content">
              <h3 id="titulo-lectores"></h3>
              <p id="resumen-lectores"></p>
            </div>
          </article>
        </div>
      </section>

      <section class="panel-box" id="expedienteBox">
        <img id="expedienteImagen" src="" alt="">
        <h2 id="expedienteTitulo"></h2>
        <p id="expedienteTexto"></p>
        <div class="button-row">
          <button class="back-btn" onclick="showHome()" id="btnBackHome"></button>
          <button class="ghost-btn" onclick="showPremium()" id="btnGoPremium"></button>
        </div>
      </section>

      <section class="panel-box" id="premiumSection">
        <div class="premium-intro">
          <h2 id="premiumTitle"></h2>
          <p id="premiumText"></p>
        </div>

        <div class="plans">
          <div class="plan">
            <h3 id="planMonthlyTitle"></h3>
            <div class="plan-price">4,99 €</div>
            <ul id="planMonthlyList"></ul>
          </div>

          <div class="plan">
            <h3 id="planYearlyTitle"></h3>
            <div class="plan-price">39,99 €</div>
            <ul id="planYearlyList"></ul>
          </div>
        </div>

        <div class="premium-login">
          <h3 id="premiumAccessTitle"></h3>

          <label for="premiumUser" id="premiumUserLabel"></label>
          <input type="text" id="premiumUser">

          <label for="premiumPass" id="premiumPassLabel"></label>
          <input type="password" id="premiumPass">

          <div class="button-row">
            <button class="enter-btn" onclick="unlockPremium()" id="btnEnterPremium"></button>
            <button class="ghost-btn" onclick="simulateSubscription()" id="btnSimulateSubscription"></button>
            <button class="ghost-btn" onclick="showHome()" id="btnPremiumBack"></button>
          </div>
        </div>

        <div id="premiumLocked" class="locked-box">
          <h3 id="premiumLockedTitle"></h3>
          <p id="premiumLockedText"></p>
        </div>

        <div id="premiumUnlocked" style="display:none;">
          <h2 class="section-title" id="premiumFilesTitle"></h2>

          <div class="cards">
            <article class="card" onclick="openPremiumExpediente('bases')">
              <div class="premium-tag" id="premiumTag1"></div>
              <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200&auto=format&fit=crop" alt="">
              <div class="card-content">
                <h3 id="premiumCard1Title"></h3>
                <p id="premiumCard1Text"></p>
              </div>
            </article>

            <article class="card" onclick="openPremiumExpediente('expedientesx')">
              <div class="premium-tag" id="premiumTag2"></div>
              <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop" alt="">
              <div class="card-content">
                <h3 id="premiumCard2Title"></h3>
                <p id="premiumCard2Text"></p>
              </div>
            </article>

            <article class="card" onclick="openPremiumExpediente('rituales')">
              <div class="premium-tag" id="premiumTag3"></div>
              <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?q=80&w=1200&auto=format&fit=crop" alt="">
              <div class="card-content">
                <h3 id="premiumCard3Title"></h3>
                <p id="premiumCard3Text"></p>
              </div>
            </article>

            <article class="card" onclick="openPremiumExpediente('cronicas')">
              <div class="premium-tag" id="premiumTag4"></div>
              <img src="https://images.unsplash.com/photo-1500534623283-312aade485b7?q=80&w=1200&auto=format&fit=crop" alt="">
              <div class="card-content">
                <h3 id="premiumCard4Title"></h3>
                <p id="premiumCard4Text"></p>
              </div>
            </article>
          </div>
        </div>
      </section>

      <section class="panel-box" id="premiumExpedienteBox">
        <img id="premiumExpedienteImagen" src="" alt="">
        <h2 id="premiumExpedienteTitulo"></h2>
        <p id="premiumExpedienteTexto"></p>
        <div class="button-row">
          <button class="back-btn" onclick="showPremium()" id="btnBackPremium"></button>
          <button class="ghost-btn" onclick="showHome()" id="btnGoHome2"></button>
        </div>
      </section>

      <section class="panel-box" id="adminPanel">
        <h2 id="adminTitle"></h2>
        <p id="adminText" style="margin-bottom: 12px; color: #efefef;"></p>

        <div class="admin-form">
          <label for="expedienteSelect" id="adminSelectLabel"></label>
          <select id="expedienteSelect" onchange="loadAdminData()"></select>

          <label for="adminTitulo" id="adminTitleLabel"></label>
          <input type="text" id="adminTitulo">

          <label for="adminResumen" id="adminSummaryLabel"></label>
          <input type="text" id="adminResumen">

          <label for="adminImagen" id="adminImageLabel"></label>
          <input type="text" id="adminImagen">

          <label for="adminTexto" id="adminTextLabel"></label>
          <textarea id="adminTexto"></textarea>

          <button class="save-btn" onclick="saveExpediente()" id="btnSaveChanges"></button>
        </div>
      </section>

      <footer class="footer" id="footerText"></footer>
    </div>
  </div>

      document.getElementById("premiumUser").placeholder = ui.premiumUserPlaceholder;
      document.getElementById("premiumPassLabel").textContent = ui.premiumPassLabel;
      document.getElementById("premiumPass").placeholder = ui.premiumPassPlaceholder;
      document.getElementById("btnEnterPremium").textContent = ui.btnEnterPremium;
      document.getElementById("btnSimulateSubscription").textContent = ui.btnSimulateSubscription;
      document.getElementById("btnPremiumBack").textContent = ui.btnPremiumBack;

      document.getElementById("premiumLockedTitle").textContent = ui.premiumLockedTitle;
      document.getElementById("premiumLockedText").textContent = ui.premiumLockedText;
      document.getElementById("premiumFilesTitle").textContent = ui.premiumFilesTitle;

      document.getElementById("premiumTag1").textContent = ui.premiumTag;
      document.getElementById("premiumTag2").textContent = ui.premiumTag;
      document.getElementById("premiumTag3").textContent = ui.premiumTag;
      document.getElementById("premiumTag4").textContent = ui.premiumTag;

      document.getElementById("premiumCard1Title").textContent = ui.premiumCard1Title;
      document.getElementById("premiumCard1Text").textContent = ui.premiumCard1Text;
      document.getElementById("premiumCard2Title").textContent = ui.premiumCard2Title;
      document.getElementById("premiumCard2Text").textContent = ui.premiumCard2Text;
      document.getElementById("premiumCard3Title").textContent = ui.premiumCard3Title;
      document.getElementById("premiumCard3Text").textContent = ui.premiumCard3Text;
      document.getElementById("premiumCard4Title").textContent = ui.premiumCard4Title;
      document.getElementById("premiumCard4Text").textContent = ui.premiumCard4Text;

      document.getElementById("btnBackPremium").textContent = ui.btnBackPremium;
      document.getElementById("btnGoHome2").textContent = ui.btnGoHome2;

      document.getElementById("adminTitle").textContent = ui.adminTitle;
      document.getElementById("adminText").textContent = ui.adminText;
      document.getElementById("adminSelectLabel").textContent = ui.adminSelectLabel;
      document.getElementById("adminTitleLabel").textContent = ui.adminTitleLabel;
      document.getElementById("adminSummaryLabel").textContent = ui.adminSummaryLabel;
      document.getElementById("adminImageLabel").textContent = ui.adminImageLabel;
      document.getElementById("adminTextLabel").textContent = ui.adminTextLabel;
      document.getElementById("btnSaveChanges").textContent = ui.btnSaveChanges;

      document.getElementById("footerText").textContent = ui.footerText;
    }

    function updateAdminSelect() {
      const select = document.getElementById("expedienteSelect");
      const current = select.value || "ovni";

      select.innerHTML = `
        <option value="ovni">${expedientes.ovni.titulo}</option>
        <option value="civilizaciones">${expedientes.civilizaciones.titulo}</option>
        <option value="muerte">${expedientes.muerte.titulo}</option>
        <option value="paranormal">${expedientes.paranormal.titulo}</option>
        <option value="tierra">${expedientes.tierra.titulo}</option>
        <option value="matrix">${expedientes.matrix.titulo}</option>
        <option value="lectores">${expedientes.lectores.titulo}</option>
      `;
      select.value = current;
    }

    function applyLanguage() {
      expedientes = getExpedientes();
      renderUI();
      renderCards();
      updateAdminSelect();

      if (document.getElementById("adminPanel").classList.contains("active")) {
        loadAdminData();
      }
    }

    function changeLanguage(lang) {
      if (!contentByLang[lang]) return;
      currentLang = lang;
      applyLanguage();
    }

    function openExpediente(tipo) {
      document.getElementById("homeSection").style.display = "none";
      document.getElementById("cardsSection").style.display = "none";
      hideAllPanels();
      document.getElementById("expedienteBox").classList.add("active");

      document.getElementById("expedienteTitulo").textContent = expedientes[tipo].titulo;
      document.getElementById("expedienteTexto").textContent = expedientes[tipo].texto;
      document.getElementById("expedienteImagen").src = images[tipo];
      document.getElementById("expedienteImagen").alt = expedientes[tipo].titulo;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showHome() {
      document.getElementById("homeSection").style.display = "block";
      document.getElementById("cardsSection").style.display = "block";
      hideAllPanels();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showPremium() {
      document.getElementById("homeSection").style.display = "none";
      document.getElementById("cardsSection").style.display = "none";
      hideAllPanels();
      document.getElementById("premiumSection").classList.add("active");
      updatePremiumView();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updatePremiumView() {
      document.getElementById("premiumUnlocked").style.display = premiumAccess ? "block" : "none";
      document.getElementById("premiumLocked").style.display = premiumAccess ? "none" : "block";
    }

    function unlockPremium() {
      const user = document.getElementById("premiumUser").value.trim();
      const pass = document.getElementById("premiumPass").value.trim();

      if (user && pass) {
        premiumAccess = true;
        updatePremiumView();
        alert(getUI().alerts.premiumOk);
      } else {
        alert(getUI().alerts.premiumNeedData);
      }
    }

    function simulateSubscription() {
      premiumAccess = true;
      updatePremiumView();
      alert(getUI().alerts.premiumSimulated);
    }

    function openPremiumExpediente(tipo) {
      if (!premiumAccess) {
        alert(getUI().alerts.premiumRequired);
        return;
      }

      const premiumData = getPremiumExpedientes();

      hideAllPanels();
      document.getElementById("premiumExpedienteBox").classList.add("active");
      document.getElementById("premiumExpedienteTitulo").textContent = premiumData[tipo].titulo;
      document.getElementById("premiumExpedienteTexto").textContent = premiumData[tipo].texto;
      document.getElementById("premiumExpedienteImagen").src = premiumImages[tipo];
      document.getElementById("premiumExpedienteImagen").alt = premiumData[tipo].titulo;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toggleAdmin() {
      document.getElementById("homeSection").style.display = "none";
      document.getElementById("cardsSection").style.display = "none";
      hideAllPanels();
      document.getElementById("adminPanel").classList.add("active");
      loadAdminData();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function loadAdminData() {
      const tipo = document.getElementById("expedienteSelect").value;
      document.getElementById("adminTitulo").value = expedientes[tipo].titulo;
      document.getElementById("adminResumen").value = expedientes[tipo].resumen;
      document.getElementById("adminImagen").value = images[tipo];
      document.getElementById("adminTexto").value = expedientes[tipo].texto;
    }

    function saveExpediente() {
      const tipo = document.getElementById("expedienteSelect").value;

      expedientes[tipo].titulo = document.getElementById("adminTitulo").value;
      expedientes[tipo].resumen = document.getElementById("adminResumen").value;
      expedientes[tipo].texto = document.getElementById("adminTexto").value;
      images[tipo] = document.getElementById("adminImagen").value;

      renderCards();
      updateAdminSelect();
      alert(getUI().alerts.saved);
    }

    document.getElementById("languageSelect").value = "es";
    applyLanguage();
  </script>
</body>
</html>
